<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼포먼스 마케터 포트폴리오</title>
    <style>
        /* 기본 스타일 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 네비게이션 바 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #0070f3;
        }

        .nav-links a {
            margin-left: 30px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #0070f3;
        }

        /* 히어로 섹션 (메인 카피) */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135px, #f5f7fa 0%, #c3cfe2 100%);
            padding-top: 70px;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 24px;
            word-break: keep-all;
        }

        .hero h1 span {
            color: #0070f3;
        }

        .hero p {
            font-size: 1.3rem;
            color: #555;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .btn {
            display: inline-block;
            background-color: #0070f3;
            color: white;
            padding: 12px 32px;
            border-radius: 5px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #0051b3;
        }

        /* 섹션 공통 스타일 */
        section {
            padding: 100px 0;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background-color: #0070f3;
            margin: 15px auto 0;
            border-radius: 2px;
        }

        /* 자기소개 섹션 */
        .about-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
            align-items: center;
        }

        .about-text h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            word-break: keep-all;
        }

        .about-text p {
            color: #555;
            word-break: keep-all;
        }

        .about-image-container {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .about-image {
            width: 100%;
            height: auto;
            aspect-ratio: 3 / 4; /* 증명사진 비율 유지 */
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* 핵심 역량 (Skills) 섹션 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 25px;
        }

        .skill-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0
